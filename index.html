<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M-SCORE</title>
  
  <link rel="icon" href="molkky.jpg">
  <link rel="apple-touch-icon" href="molkky.jpg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  
  <link rel="manifest" href="manifest.json">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 5px; background-color: #f4f4f9; color: #333; }
    .screen { display: none; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 450px; margin: 0 auto; box-sizing: border-box; }
    .active-screen { display: block; }
    h1, h2, h3 { margin-top: 0; }
    button { padding: 12px; margin: 5px; font-size: 16px; border-radius: 6px; border: none; cursor: pointer; color: white; font-weight: bold; }
    .btn-primary { background-color: #007bff; }
    .btn-success { background-color: #28a745; }
    .btn-warning { background-color: #ffc107; color: #333; }
    .btn-danger { background-color: #dc3545; }
    .btn-secondary { background-color: #6c757d; }
    .btn-info { background-color: #17a2b8; }
    input[type="text"] { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
    
    .molkky-layout { display: flex; flex-direction: column; align-items: center; gap: 5px; margin: 10px 0; }
    .molkky-row { display: flex; gap: 5px; justify-content: center; }
    .pin { width: 45px; height: 45px; border-radius: 50%; background-color: #e9ecef; color: #333; font-size: 18px; border: 2px solid #ccc; transition: all 0.2s; display: flex; justify-content: center; align-items: center; cursor: pointer; padding: 0;}
    .pin.selected { background-color: #28a745; color: white; border-color: #1e7e34; transform: scale(1.1); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    
    .current-turn-box { background: #007bff; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    .current-turn-box h2 { margin: 0 0 5px 0; font-size: 20px; }
    .current-turn-box .stats { display: flex; justify-content: space-around; align-items: center; font-size: 16px; }
    .action-buttons { display: flex; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
    .action-buttons button { flex: 1; margin: 0; padding: 10px; font-size: 16px; }
    
    #play-scoreboard { display: grid; gap: 8px; margin-bottom: 10px; }
    .score-grid-1 { grid-template-columns: 1fr; }
    .score-grid-2 { grid-template-columns: 1fr 1fr; }

    .team-card { border: 2px solid #ddd; padding: 8px; border-radius: 8px; text-align: left; background: #fff; display: flex; flex-direction: column; justify-content: space-between; }
    .team-card.active { border-color: #007bff; background: #e6f2ff; box-shadow: 0 0 8px rgba(0,123,255,0.3); }
    .team-card.winner { background-color: #fff3cd; border-color: #ffeeba; }
    .team-card.disqualified { background-color: #e9ecef; color: #6c757d; }
    .team-info { width: 100%; margin-bottom: 5px; }
    .team-scores { width: 100%; text-align: right; }
    .total-score { font-size: 11px; color: #666; }
    .game-score { font-size: 20px; font-weight: bold; }
    .miss-marks { color: red; font-size: 12px; }

    .order-list-item { padding: 15px; border: 1px solid #ccc; margin-bottom: 5px; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; background: #f9f9f9; }
    .order-list-item.selected { background: #d4edda; border-color: #28a745; }
    .order-badge { background: #28a745; color: white; border-radius: 50%; width: 24px; height: 24px; display: inline-flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold;}

    hr { border: 0; height: 1px; background: #ccc; margin: 15px 0; }

    .table-container { overflow-x: auto; margin-top: 15px; }
    .scoresheet-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .scoresheet-table th, .scoresheet-table td { border: 1px solid #555; padding: 8px; text-align: center; vertical-align: middle; }
    .scoresheet-table tbody tr:nth-child(even) { background-color: #f2f2f2; }
    .scoresheet-table tbody tr:nth-child(odd) { background-color: #ffffff; }
    .red-circle { display: inline-flex; justify-content: center; align-items: center; width: 24px; height: 24px; border: 2px solid #e53935; border-radius: 50%; color: #000; font-weight: bold; }

    @media print {
      body { background-color: white; padding: 0; }
      .screen { box-shadow: none; max-width: 100%; padding: 0; margin: 0; }
      .no-print { display: none !important; }
      .scoresheet-table { width: 100%; font-size: 12pt; border: 2px solid #000; }
      .scoresheet-table th, .scoresheet-table td { border: 1px solid #000; padding: 6px; }
      .red-circle { border-color: red !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .scoresheet-table tbody tr:nth-child(even) { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

  <div id="screen-title" class="screen active-screen no-print">
    <h1 style="font-size: 32px; letter-spacing: 2px; color: #007bff; margin-bottom: 0;">M-SCORE</h1>
    <div style="font-size: 12px; color: #666; margin-bottom: 15px;">(v26.04.23)</div>
    
    <div style="text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; font-size: 14px; margin-bottom: 20px;">
      <b>【モルックのルール】</b><br>
      ・1本だけ倒した場合は、ピンに書かれた数字が得点になります。<br>
      ・複数本倒した場合は、倒した「本数」が得点になります。<br>
      ・ピッタリ50点になったら勝利です。<br>
      ・50点を超えると、25点に減点されて継続となります。<br>
      ・3回連続で1本も倒せなかった（ファウル）場合は失格です。
    </div>
    <button class="btn-primary" style="width: 100%; font-size: 20px; padding: 15px;" onclick="startSetup()">スタート</button>
  </div>

  </body>
</html>
